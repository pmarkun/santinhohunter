[build]
builder = "RAILPACK"
buildCommand = "npx expo export --platform web"
watchPatterns = [
  "app/**",
  "src/**",
  "assets/**",
  "scripts/serve-static.js",
  "package.json",
  "package-lock.json",
  "app.json",
  "railway/web.toml"
]

[deploy]
startCommand = "node scripts/serve-static.js dist"
healthcheckPath = "/"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
